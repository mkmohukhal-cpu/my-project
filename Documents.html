<div class="container-fluid py-4">
  <div class="card border-0 shadow-sm p-4 mb-4">
    <h4 class="mb-3"><i class="fa-solid fa-file-lines me-2"></i> إدارة مستندات الموظفين</h4>
    <p class="text-muted small">قم بإدخال رقم الموظف لعرض مستنداته أو تحديث حالتها.</p>
    
    <div class="row g-3 align-items-center mb-4">
      <div class="col-md-4">
        <label for="searchEmpId" class="form-label">رقم الموظف (Employee ID)</label>
        <input type="text" id="searchEmpId" class="form-control" placeholder="أدخل رقم الموظف...">
      </div>
      <div class="col-md-2 mt-4">
        <button class="btn btn-primary w-100" onclick="fetchDocuments()"><i class="fa-solid fa-search ms-1"></i> بحث</button>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm p-4">
    <h5 class="mb-3">قائمة المستندات</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>معرف المستند</th>
            <th>نوع المستند</th>
            <th>الحالة</th>
            <th>تاريخ الرفع</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="documentsTableBody">
          <tr>
            <td colspan="5" class="text-center text-muted">ابحث برقم الموظف لعرض المستندات</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function fetchDocuments() {
    const empId = document.getElementById('searchEmpId').value.trim();
    if (!empId) {
      alert('يرجى إدخال رقم الموظف أولاً');
      return;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        const tbody = document.getElementById('documentsTableBody');
        tbody.innerHTML = '';
        
        if (response.success && response.data && response.data.length > 0) {
          response.data.forEach(doc => {
            tbody.innerHTML += `
              <tr>
                <td>${doc.documentId || '--'}</td>
                <td>${doc.documentType || 'مستند'}</td>
                <td><span class="badge bg-secondary">${doc.status || 'Active'}</span></td>
                <td>${doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleDateString() : '--'}</td>
                <td>
                  <button class="btn btn-sm btn-outline-warning" onclick="changeStatus('${doc.documentId}')">تحديث الحالة</button>
                </td>
              </tr>
            `;
          });
        } else {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">لا توجد مستندات لهذا الموظف</td></tr>`;
        }
      })
      .withFailureHandler(function(err) {
        alert('حدث خطأ أثناء جلب المستندات: ' + err.message);
      })
      .getDocumentsByEmployeeId(empId);
  }

  function changeStatus(docId) {
    const newStatus = prompt('أدخل الحالة الجديدة (Active, Archived, Replaced):', 'Archived');
    if (!newStatus) return;

    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          alert('تم التحديث بنجاح');
          fetchDocuments();
        } else {
          alert('فشل التحديث: ' + response.message);
        }
      })
      .updateDocumentStatus(docId, newStatus);
  }
</script>
