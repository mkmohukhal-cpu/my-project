<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام قاعدة بيانات الموظفين</title>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <?!= include('Styles'); ?>
</head>
<body class="bg-light">

  <? if (!isAuthenticated) { ?>

    <?!= include('Login'); ?>

  <? } else { ?>

    <div class="d-flex">
      <?!= includeWithData('Sidebar', { currentUser: currentUser, page: page }); ?>

      <div class="flex-grow-1 d-flex flex-column" style="min-height: 100vh;">
        <?!= includeWithData('Header', { currentUser: currentUser }); ?>

        <div id="main-content" class="flex-grow-1 p-4">
          <?
            // قائمة بيضاء أمنية: بس الصفحات دي مسموح تتحمّل عبر ?page=
            var allowedPages = {
              'main': 'Dashboard', 'dashboard': 'Dashboard', 'Dashboard': 'Dashboard',
              'profile': 'Profile', 'Profile': 'Profile',
              'notifications': 'Notifications', 'Notifications': 'Notifications',
              'search': 'Search', 'Search': 'Search',
              'employeeform': 'EmployeeForm', 'EmployeeForm': 'EmployeeForm',
              'documents': 'Documents', 'Documents': 'Documents'
            };
            var targetPage = allowedPages[page] || 'Dashboard';
          ?>
          <?!= includeWithData(targetPage, { currentUser: currentUser, employeeId: employeeId }); ?>
        </div>

        <?!= include('Footer'); ?>
      </div>
    </div>

  <? } ?>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('Scripts'); ?>
</body>
</html>
