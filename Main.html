<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نظام قاعدة بيانات الموظفين</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <?!= include('Styles'); ?>
</head>
<body class="bg-light">
  <? if (!isAuthenticated) { ?>
    <?!= include('Login'); ?>
  <? } else { ?>
    <? if (page && page !== 'Dashboard' && page !== 'Main') { ?>
      <? 
        // قائمة بيضاء أمنية تربط الأسماء المحتملة في الرابط بملفات الـ HTML الفعلية
        var allowedPages = {
          'main'           : 'Home',
          'Dashboard'      : 'Dashboard',
          'profile'        : 'Profile',
          'Profile'        : 'Profile',
          'notifications'  : 'Notifications',
          'Notifications'  : 'Notifications',
          'search'         : 'Search',
          'Search'         : 'Search',
          'EmployeeForm'   : 'EmployeeForm',
          'Documents'      : 'Documents'
        };
        var targetPage = allowedPages[page] || page;
        var content = include(targetPage);
        
        if (content.indexOf('Error loading') !== -1) { ?>
          <div class="container py-5 text-center">
            <h3 class="text-danger">الملف غير موجود: <?= targetPage ?></h3>
            <p>تأكد من إنشاء ملف HTML بهذا الاسم في المشروع.</p>
          </div>
        <? } else { ?>
          <?!= content; ?>
        <? } ?>
    <? } else { ?>
      <?!= include('Dashboard'); ?>
    <? } ?>
  <? } ?>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('Scripts'); ?>
</body>
</html>
